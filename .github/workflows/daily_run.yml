name: Daily Would You Rather Short

on:
  schedule:
    # Runs at 14:00 UTC daily — gives 2 hours before the 16:00 UTC publish slot
    - cron: "0 14 * * *"
  workflow_dispatch:  # allows manual trigger from GitHub Actions UI

jobs:
  generate-and-upload:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install ffmpeg
        run: sudo apt-get install -y ffmpeg

      - name: Install Poppins font
        run: |
          mkdir -p ~/.fonts
          wget -q https://github.com/google/fonts/raw/main/ofl/poppins/Poppins-Bold.ttf -P ~/.fonts
          fc-cache -f

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Restore state (used_questions + history)
        uses: actions/cache@v4
        with:
          path: state/
          key: wyr-state-${{ github.run_id }}
          restore-keys: wyr-state-

      - name: Write .env from secrets
        run: |
          cat > .env << EOF
          GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
          PEXELS_API_KEY=${{ secrets.PEXELS_API_KEY }}
          MANUAL_REVIEW_GATE=False
          ROUNDS_PER_VIDEO=3
          EOF

      - name: Write YouTube credentials from secrets
        run: |
          echo '${{ secrets.YT_CLIENT_SECRETS }}' > client_secret.json
          echo '${{ secrets.YT_TOKEN }}' > yt_token.json

      - name: Run pipeline
        run: python main.py

      - name: Save state cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: state/
          key: wyr-state-${{ github.run_id }}
